[custom-cid-normalization]
exten => s,1,NoOp(--- Processing CallerID via Tafreshi Iran CID ---)

; 1. Filter out everything except digits 0-9
exten => s,n,Set(CALLERID(num)=${FILTER(0-9,${CALLERID(num)})})

; 2. Call the Bash script logic and pass the current CallerID
; This script will add the Province Code if the number is local (8 digits)
exten => s,n,AGI(tafreshiirancid_logic.sh,${CALLERID(num)})

; 3. Log the result to Asterisk Console for debugging
exten => s,n,NoOp(--- Final CallerID: ${CALLERID(num)} ---)

exten => s,n,Return()
